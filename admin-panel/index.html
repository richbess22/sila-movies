<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILA MOVIES - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0A0F1E;
            color: white;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0A0F1E 0%, #1A1F2E 100%);
        }

        .login-box {
            background: #1A1F2E;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,102,255,0.2);
        }

        .login-box h1 {
            color: #0066FF;
            margin-bottom: 30px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #0A0F1E;
            border: 1px solid #2A2F3E;
            border-radius: 5px;
            color: white;
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-box button:hover {
            background: #0052CC;
        }

        .error {
            color: #FF4444;
            margin-bottom: 20px;
            text-align: center;
        }

        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 250px;
            background: #1A1F2E;
            padding: 30px 0;
        }

        .sidebar h2 {
            color: #0066FF;
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sidebar li:hover, .sidebar li.active {
            background: #0066FF;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .header {
            background: #1A1F2E;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1A1F2E;
            padding: 20px;
            border-radius: 10px;
        }

        .stat-card h3 {
            color: #8899AA;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #0066FF;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #0066FF;
        }

        .movie-form {
            background: #1A1F2E;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #8899AA;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0A0F1E;
            border: 1px solid #2A2F3E;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: #0066FF;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .movies-table {
            background: #1A1F2E;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2A2F3E;
        }

        th {
            color: #8899AA;
            font-weight: normal;
        }

        td {
            color: white;
        }

        .action-btn {
            background: none;
            border: none;
            color: #0066FF;
            cursor: pointer;
            margin-right: 10px;
            font-size: 14px;
        }

        .delete-btn {
            color: #FF4444;
        }

        .upload-btn {
            background: #2A2F3E;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>SILA MOVIES ADMIN</h1>
            <input type="password" id="pinInput" placeholder="Enter Admin PIN" value="sila0022">
            <button onclick="login()">Login</button>
            <div class="error" id="error"></div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="sidebar">
            <h2>SILA MOVIES</h2>
            <ul>
                <li class="active" onclick="showSection('dashboard')">Dashboard</li>
                <li onclick="showSection('movies')">Movies</li>
                <li onclick="showSection('addMovie')">Add Movie</li>
                <li onclick="showSection('liveTV')">Live TV</li>
                <li onclick="showSection('users')">Users</li>
                <li onclick="showSection('settings')">Settings</li>
                <li onclick="logout()">Logout</li>
            </ul>
        </div>

        <div class="main-content">
            <!-- Dashboard Section -->
            <div id="dashboardSection">
                <div class="header">
                    <h2>Dashboard Overview</h2>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Movies</h3>
                        <div class="value" id="totalMovies">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="value" id="totalUsers">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Views</h3>
                        <div class="value" id="totalViews">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Live Channels</h3>
                        <div class="value" id="liveChannels">0</div>
                    </div>
                </div>
            </div>

            <!-- Movies Section -->
            <div id="moviesSection" style="display: none;">
                <div class="header">
                    <h2>Manage Movies</h2>
                </div>

                <div class="movies-table" id="moviesTable">
                    <!-- Movies will be loaded here -->
                </div>
            </div>

            <!-- Add Movie Section -->
            <div id="addMovieSection" style="display: none;">
                <div class="header">
                    <h2>Add New Movie</h2>
                </div>

                <div class="movie-form">
                    <form id="movieForm">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" id="title" required>
                        </div>

                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="description" required></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Poster URL</label>
                                <input type="url" id="poster" required>
                            </div>
                            <div class="form-group">
                                <label>Backdrop URL</label>
                                <input type="url" id="backdrop" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Year</label>
                                <input type="number" id="year" required>
                            </div>
                            <div class="form-group">
                                <label>Rating (0-10)</label>
                                <input type="number" step="0.1" id="rating" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Genre (comma separated)</label>
                            <input type="text" id="genre" placeholder="Action, Drama, Comedy" required>
                        </div>

                        <div class="form-group">
                            <label>Duration</label>
                            <input type="text" id="duration" placeholder="2h 15min" required>
                        </div>

                        <div class="form-group">
                            <label>Video URL (MP4 or M3U8)</label>
                            <input type="url" id="videoUrl" required>
                        </div>

                        <div class="form-group">
                            <label>Download URL (Google Drive)</label>
                            <input type="url" id="downloadUrl">
                        </div>

                        <div class="form-group">
                            <label>Trailer URL (YouTube)</label>
                            <input type="url" id="trailerUrl">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="trending"> Trending
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn">Add Movie</button>
                    </form>
                </div>
            </div>

            <!-- Live TV Section -->
            <div id="liveTVSection" style="display: none;">
                <div class="header">
                    <h2>Manage Live TV Channels</h2>
                </div>

                <div class="movie-form">
                    <form id="channelForm">
                        <div class="form-group">
                            <label>Channel Name</label>
                            <input type="text" id="channelName" required>
                        </div>

                        <div class="form-group">
                            <label>Logo URL</label>
                            <input type="url" id="channelLogo" required>
                        </div>

                        <div class="form-group">
                            <label>Stream URL (M3U8)</label>
                            <input type="url" id="streamUrl" required>
                        </div>

                        <div class="form-group">
                            <label>Category</label>
                            <input type="text" id="channelCategory" value="Entertainment" required>
                        </div>

                        <button type="submit" class="submit-btn">Add Channel</button>
                    </form>
                </div>

                <div class="movies-table" id="channelsTable">
                    <!-- Channels will be loaded here -->
                </div>
            </div>

            <!-- Users Section -->
            <div id="usersSection" style="display: none;">
                <div class="header">
                    <h2>Users</h2>
                </div>

                <div class="movies-table" id="usersTable">
                    <!-- Users will be loaded here -->
                </div>
            </div>

            <!-- Settings Section -->
            <div id="settingsSection" style="display: none;">
                <div class="header">
                    <h2>Settings</h2>
                </div>

                <div class="movie-form">
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="adsEnabled" checked> Enable Ads
                        </label>
                    </div>

                    <div class="form-group">
                        <label>Subscription Price (TZS)</label>
                        <input type="number" id="subscriptionPrice" value="3000">
                    </div>

                    <button onclick="saveSettings()" class="submit-btn">Save Settings</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://192.168.1.100:5000/api'; // Replace with your server IP
        let token = '';

        async function login() {
            const pin = document.getElementById('pinInput').value;
            
            try {
                const res = await fetch(`${API_URL}/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    token = data.token;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    loadDashboard();
                    loadMovies();
                    loadUsers();
                    loadChannels();
                } else {
                    document.getElementById('error').textContent = 'Invalid PIN';
                }
            } catch (error) {
                document.getElementById('error').textContent = 'Connection error';
            }
        }

        async function loadDashboard() {
            try {
                const res = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const stats = await res.json();
                
                document.getElementById('totalMovies').textContent = stats.totalMovies;
                document.getElementById('totalUsers').textContent = stats.totalUsers;
                document.getElementById('totalViews').textContent = stats.totalViews;
                
                const liveRes = await fetch(`${API_URL}/livetv`);
                const channels = await liveRes.json();
                document.getElementById('liveChannels').textContent = channels.length;
            } catch (error) {
                console.error(error);
            }
        }

        async function loadMovies() {
            try {
                const res = await fetch(`${API_URL}/movies?limit=50`);
                const movies = await res.json();
                
                let html = '<table><tr><th>Poster</th><th>Title</th><th>Year</th><th>Rating</th><th>Actions</th></tr>';
                
                movies.forEach(movie => {
                    html += `
                        <tr>
                            <td><img src="${movie.poster}" style="width: 50px; height: 75px; object-fit: cover;"></td>
                            <td>${movie.title}</td>
                            <td>${movie.year}</td>
                            <td>${movie.rating}</td>
                            <td>
                                <button class="action-btn" onclick="editMovie('${movie._id}')">Edit</button>
                                <button class="action-btn delete-btn" onclick="deleteMovie('${movie._id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</table>';
                document.getElementById('moviesTable').innerHTML = html;
            } catch (error) {
                console.error(error);
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                
                let html = '<table><tr><th>Device ID</th><th>Joined</th><th>Last Active</th><th>Status</th></tr>';
                
                users.forEach(user => {
                    html += `
                        <tr>
                            <td>${user.deviceId.substring(0, 20)}...</td>
                            <td>${new Date(user.joinedAt).toLocaleDateString()}</td>
                            <td>${user.lastActive ? new Date(user.lastActive).toLocaleDateString() : 'Never'}</td>
                            <td>${user.subscription}</td>
                        </tr>
                    `;
                });
                
                html += '</table>';
                document.getElementById('usersTable').innerHTML = html;
            } catch (error) {
                console.error(error);
            }
        }

        async function loadChannels() {
            try {
                const res = await fetch(`${API_URL}/livetv`);
                const channels = await res.json();
                
                let html = '<table><tr><th>Logo</th><th>Name</th><th>Category</th><th>Status</th><th>Actions</th></tr>';
                
                channels.forEach(channel => {
                    html += `
                        <tr>
                            <td><img src="${channel.logo}" style="width: 40px; height: 40px; border-radius: 20px;"></td>
                            <td>${channel.name}</td>
                            <td>${channel.category}</td>
                            <td><span style="color: #00FF00;">${channel.status}</span></td>
                            <td>
                                <button class="action-btn delete-btn" onclick="deleteChannel('${channel._id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</table>';
                document.getElementById('channelsTable').innerHTML = html;
            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('movieForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const movie = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                poster: document.getElementById('poster').value,
                backdrop: document.getElementById('backdrop').value,
                year: parseInt(document.getElementById('year').value),
                rating: parseFloat(document.getElementById('rating').value),
                genre: document.getElementById('genre').value.split(',').map(g => g.trim()),
                duration: document.getElementById('duration').value,
                videoUrl: document.getElementById('videoUrl').value,
                downloadUrl: document.getElementById('downloadUrl').value,
                trailerUrl: document.getElementById('trailerUrl').value,
                trending: document.getElementById('trending').checked
            };
            
            try {
                const res = await fetch(`${API_URL}/movies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(movie)
                });
                
                if (res.ok) {
                    alert('Movie added successfully!');
                    e.target.reset();
                    loadMovies();
                    showSection('movies');
                }
            } catch (error) {
                alert('Error adding movie');
            }
        });

        document.getElementById('channelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const channel = {
                name: document.getElementById('channelName').value,
                logo: document.getElementById('channelLogo').value,
                streamUrl: document.getElementById('streamUrl').value,
                category: document.getElementById('channelCategory').value,
                status: 'online'
            };
            
            try {
                const res = await fetch(`${API_URL}/livetv`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(channel)
                });
                
                if (res.ok) {
                    alert('Channel added successfully!');
                    e.target.reset();
                    loadChannels();
                }
            } catch (error) {
                alert('Error adding channel');
            }
        });

        async function deleteMovie(id) {
            if (confirm('Are you sure you want to delete this movie?')) {
                try {
                    await fetch(`${API_URL}/movies/${id}`, {
                        method: 'DELETE'
                    });
                    loadMovies();
                } catch (error) {
                    alert('Error deleting movie');
                }
            }
        }

        async function deleteChannel(id) {
            if (confirm('Are you sure you want to delete this channel?')) {
                try {
                    await fetch(`${API_URL}/livetv/${id}`, {
                        method: 'DELETE'
                    });
                    loadChannels();
                } catch (error) {
                    alert('Error deleting channel');
                }
            }
        }

        function showSection(section) {
            document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('moviesSection').style.display = 'none';
            document.getElementById('addMovieSection').style.display = 'none';
            document.getElementById('liveTVSection').style.display = 'none';
            document.getElementById('usersSection').style.display = 'none';
            document.getElementById('settingsSection').style.display = 'none';
            
            if (section === 'dashboard') document.getElementById('dashboardSection').style.display = 'block';
            if (section === 'movies') {
                document.getElementById('moviesSection').style.display = 'block';
                loadMovies();
            }
            if (section === 'addMovie') document.getElementById('addMovieSection').style.display = 'block';
            if (section === 'liveTV') {
                document.getElementById('liveTVSection').style.display = 'block';
                loadChannels();
            }
            if (section === 'users') {
                document.getElementById('usersSection').style.display = 'block';
                loadUsers();
            }
            if (section === 'settings') document.getElementById('settingsSection').style.display = 'block';
        }

        function saveSettings() {
            alert('Settings saved!');
        }

        function logout() {
            token = '';
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
    </script>
</body>
</html>
